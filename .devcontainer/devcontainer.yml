name: tapcraft-dev

services:
  temporal:
    image: temporalio/temporal:latest
    container_name: tapcraft-dev-temporal
    command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
    networks:
      - tapcraft-dev

  workspace:
    image: mcr.microsoft.com/devcontainers/python:1-3.11-bookworm
    container_name: tapcraft-dev-workspace
    volumes:
      - ../..:/workspace:cached
    command: sleep infinity
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_started
    networks:
      - tapcraft-dev

networks:
  tapcraft-dev:
