services:
  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--ip", "0.0.0.0"]
    ports:
      - "7234:7233"
      - "8082:8233"
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "src.api.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - DATABASE_URL=sqlite+aiosqlite:///./data/tapcraft.db
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
      - TZ_DEFAULT=${TZ_DEFAULT:-UTC}
      # BYOK Configuration (takes precedence)
      - COPILOT_PROVIDER=${COPILOT_PROVIDER:-anthropic}
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      - COPILOT_MODEL=${COPILOT_MODEL:-}
      # Fallback to internal keys
      - INTERNAL_ANTHROPIC_LARGE_API_KEY=${INTERNAL_ANTHROPIC_LARGE_API_KEY:-}
      - INTERNAL_ANTHROPIC_LARGE_MODEL=${INTERNAL_ANTHROPIC_LARGE_MODEL:-claude-sonnet-4-20250514}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - temporal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "src.worker.worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - DATABASE_URL=sqlite+aiosqlite:///./data/tapcraft.db
      # BYOK Configuration (takes precedence)
      - COPILOT_PROVIDER=${COPILOT_PROVIDER:-anthropic}
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
      - COPILOT_MODEL=${COPILOT_MODEL:-}
      # Fallback to internal keys
      - INTERNAL_ANTHROPIC_LARGE_API_KEY=${INTERNAL_ANTHROPIC_LARGE_API_KEY:-}
      - INTERNAL_ANTHROPIC_LARGE_MODEL=${INTERNAL_ANTHROPIC_LARGE_MODEL:-claude-sonnet-4-20250514}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      - temporal
