services:
  postgresql:
    image: postgres:13
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.21.0
    depends_on:
      - postgresql
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.23.0
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["poetry", "run", "uvicorn", "src.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
      - GIT_REMOTE_URL=${GIT_REMOTE_URL:-}
      - TZ_DEFAULT=${TZ_DEFAULT:-UTC}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api-venv:/app/.venv
    depends_on:
      - temporal

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["poetry", "run", "python", "-m", "src.worker.worker"]
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_ADDRESS=temporal:7233
    volumes:
      - .:/app
      - worker-venv:/app/.venv
    depends_on:
      - temporal

volumes:
  postgres-data:
  api-venv:
  worker-venv:
